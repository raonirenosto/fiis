name: Gerar Relatório de FIIs

on:
  schedule:
    - cron: '0 11 * * *'  # Todos os dias às 8h (horário de Brasília)
    - cron: '0 15 * * *'  # Todos os dias às 12h (horário de Brasília)
    - cron: '0 21 * * *'  # Todos os dias às 18h (horário de Brasília)
  workflow_dispatch:  # Permite rodar manualmente

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  gerar-relatorio:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Restaurar cache de meses
        uses: actions/cache@v4
        with:
          path: cache_meses.csv
          key: cache-meses-v2-${{ github.run_id }}
          restore-keys: cache-meses-v2-

      - name: Gerar relatório
        run: node pvp-fiis.js --investidor10

      - name: Preparar para deploy
        run: |
          mkdir -p _site
          cp relatorios/*.html _site/
          LATEST=$(ls -t relatorios/*.html | head -1)
          cp "$LATEST" _site/index.html
          cat > _site/manifest.json << 'EOF'
          {
            "name": "Scanner FIIs",
            "short_name": "Scanner FIIs",
            "start_url": "/fiis/",
            "display": "standalone",
            "background_color": "#f4f8ff",
            "theme_color": "#4a90e2",
            "icons": [{"src": "icon-192.svg", "sizes": "192x192", "type": "image/svg+xml"}, {"src": "icon-192.svg", "sizes": "512x512", "type": "image/svg+xml"}]
          }
          EOF
          cat > _site/icon-192.svg << 'EOF'
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192"><rect width="192" height="192" rx="32" fill="#4a90e2"/><rect x="30" y="120" width="24" height="40" rx="4" fill="white"/><rect x="64" y="90" width="24" height="70" rx="4" fill="white"/><rect x="98" y="60" width="24" height="100" rx="4" fill="white"/><rect x="132" y="30" width="24" height="130" rx="4" fill="white"/><polyline points="40,110 75,80 110,50 145,25" stroke="#00e676" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/><polygon points="145,25 130,35 140,40" fill="#00e676"/></svg>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: gerar-relatorio
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
